version: "3.9"

services:
  token-server:
    build: ./token-server
    container_name: biometric_token_server
    ports:
      - "8080:8080"
    env_file: ./token-server/.env
    volumes:
      - face_db_data:/app/data
    networks:
      - biometric_net
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8080/health/ready')\""]
      interval: 5s
      timeout: 3s
      retries: 10

  biometric-agent:
    build: ./agent
    container_name: biometric_agent
    ports:
      - "8000:8000"
    env_file: ./agent/.env
    volumes:
      - face_db_data:/app/data
    depends_on:
      token-server:
        condition: service_healthy
    networks:
      - biometric_net

  portfolio-api:
    build: ./portfolio-api
    container_name: biometric_portfolio
    ports:
      - "9000:9000"
    environment:
      KEYCLOAK_BASE_URL: http://token-server:8080
      KEYCLOAK_REALM: biometric-banking
    depends_on:
      token-server:
        condition: service_healthy
    networks:
      - biometric_net

  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: biometric_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
    networks:
      - biometric_net
    depends_on:
      - biometric-agent

  grafana:
    image: grafana/grafana:11.2.0
    container_name: biometric_grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    networks:
      - biometric_net
    depends_on:
      - prometheus

volumes:
  prometheus_data:
  grafana_data:
  face_db_data:

networks:
  biometric_net:
    driver: bridge
